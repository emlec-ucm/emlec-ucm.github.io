<svg width="1400" height="480" viewBox="0 0 1400 480" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>EESML — Econometría en espacio de estados y machine learning, UCM</title>
  <desc>Logo del grupo de investigación Econometría en espacio de estados y machine learning de la Universidad Complutense de Madrid (ICAE), fundado en 2004.</desc>

  <!-- Fondo blanco (necesario para og:image) -->
  <rect width="1400" height="480" fill="#ffffff"/>

  <!-- === SÍMBOLO === -->
  <rect x="140" y="85" width="310" height="310" rx="28" fill="#185FA5"/>

  <!-- Red ML: nodos capa superior -->
  <circle cx="185" cy="145" r="11" fill="white" opacity="0.55"/>
  <circle cx="218" cy="131" r="11" fill="white" opacity="0.75"/>
  <circle cx="252" cy="145" r="11" fill="white" opacity="0.55"/>
  <circle cx="285" cy="131" r="11" fill="white" opacity="0.75"/>
  <circle cx="318" cy="145" r="11" fill="white" opacity="0.55"/>
  <line x1="196" y1="145" x2="207" y2="137" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="229" y1="131" x2="241" y2="139" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="263" y1="139" x2="274" y2="134" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="196" y1="149" x2="241" y2="143" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="229" y1="135" x2="274" y2="139" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="263" y1="135" x2="307" y2="141" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- Nodo estado 1 -->
  <circle cx="215" cy="240" r="22" fill="white" opacity="0.95"/>
  <text x="215" y="247" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="700" fill="#185FA5">x₁</text>

  <!-- Nodo estado 2 -->
  <circle cx="295" cy="217" r="22" fill="white" opacity="0.95"/>
  <text x="295" y="224" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="700" fill="#185FA5">x₂</text>

  <!-- Nodo observación -->
  <circle cx="255" cy="290" r="16" fill="none" stroke="white" stroke-width="2.5" opacity="0.9"/>
  <text x="255" y="296" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="400" fill="white" opacity="0.9">y</text>

  <!-- Flechas de transición estado -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <line x1="236" y1="237" x2="271" y2="223" stroke="white" stroke-width="2" opacity="0.8" marker-end="url(#arr)"/>
  <line x1="218" y1="260" x2="241" y2="276" stroke="white" stroke-width="2" opacity="0.7" marker-end="url(#arr)"/>
  <line x1="293" y1="237" x2="268" y2="275" stroke="white" stroke-width="2" opacity="0.7" marker-end="url(#arr)"/>

  <!-- Serie temporal: señal ondulada -->
  <polyline points="155,340 185,320 210,353 238,313 265,343 292,307 320,337 348,320 400,335 420,323" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <line x1="155" y1="363" x2="425" y2="363" stroke="white" stroke-width="1" stroke-dasharray="6 6" opacity="0.3"/>

  <!-- === TEXTO DERECHA === -->

  <!-- Primera parte del nombre -->
  <text x="510" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="44" font-weight="400" fill="#185FA5" letter-spacing="0.02em">Econometría en Espacio de los Estados</text>

  <!-- Segunda parte del nombre -->
  <text x="510" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="44" font-weight="400" fill="#5F5E5A" letter-spacing="0.02em">y Machine Learning</text>
  
  <!-- Separador -->
  <line x1="510" y1="310" x2="980" y2="310" stroke="#B5D4F4" stroke-width="1.2"/>

  <!-- Institución -->
  <text x="510" y="335" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#B4B2A9" letter-spacing="0.06em">UNIVERSIDAD COMPLUTENSE DE MADRID · desde 2004</text>

</svg>
